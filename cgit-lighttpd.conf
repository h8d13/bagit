var.confdir = var.CWD

server.modules = ("mod_cgi", "mod_setenv", "mod_rewrite")
server.document-root = var.confdir + "/cgit"
server.port = 8080
server.bind = "0.0.0.0"
mimetype.assign = (".css" => "text/css", ".png" => "image/png", ".ico" => "image/x-icon")

url.rewrite-once = (
    # Static files
    "^/(cgit\.css|cgit-dark\.css|cgit\.png|favicon\.ico)$" => "/$1",
    # Markdown files in tree view -> render as HTML
    "^/([^/]+\.git)/tree/(.+\.md)$" => "/md-handler.cgi?repo=$1&path=$2",
    # Everything else -> cgit (PATH_INFO style preserves query string)
    "^/(.*)$" => "/cgit.cgi/$1"
)

cgi.assign = (".cgi" => "")
setenv.add-environment = ("CGIT_CONFIG" => var.confdir + "/.cgitrc")
